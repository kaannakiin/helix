# ============================================================
# Helix — Full Stack Docker Compose
# ============================================================
#
# All services in one file. Portainer CE manages this stack
# via its web dashboard (:9443). Caddy handles all routing
# and on-demand TLS on ports 80/443.
#
# Usage:
#   docker compose up -d                             # Start core (portal, router, backend)
#   docker compose --profile b2c up -d               # Start with B2C storefront
#   docker compose --profile full up -d              # Start everything (B2C + B2B)
#   docker compose --profile b2c --profile b2b up -d # Start both storefronts
#   docker compose run --rm seed                     # Run initial seed (once)
#   docker compose logs -f                           # Follow logs
#
# ============================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-helix}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helix}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (Object Storage) ─────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend (NestJS) ───────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Core
      DATABASE_URL: postgresql://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-helix}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: "3001"
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
      # Admin Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Customer (Storefront) Auth
      CUSTOMER_JWT_SECRET: ${CUSTOMER_JWT_SECRET}
      CUSTOMER_JWT_REFRESH_SECRET: ${CUSTOMER_JWT_REFRESH_SECRET}
      # MinIO (internal service name)
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-helix}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      # Facebook OAuth
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL:-}
      # Instagram OAuth
      INSTAGRAM_CLIENT_ID: ${INSTAGRAM_CLIENT_ID:-}
      INSTAGRAM_CLIENT_SECRET: ${INSTAGRAM_CLIENT_SECRET:-}
      INSTAGRAM_CALLBACK_URL: ${INSTAGRAM_CALLBACK_URL:-}
      # Storefront Router (cache invalidation)
      ROUTER_URL: http://storefront-router:3100
      ROUTER_INTERNAL_SECRET: ${ROUTER_INTERNAL_SECRET}

  # ── Portal (Admin — Next.js) ───────────────────────────
  portal:
    build:
      context: .
      dockerfile: docker/portal.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://backend:3001
      JWT_SECRET: ${JWT_SECRET}
      CUSTOMER_JWT_SECRET: ${CUSTOMER_JWT_SECRET}

  # ── Storefront Router (Fastify Reverse Proxy) ──────────
  storefront-router:
    build:
      context: .
      dockerfile: docker/storefront-router.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: "3100"
      BACKEND_URL: http://backend:3001
      ROUTER_INTERNAL_SECRET: ${ROUTER_INTERNAL_SECRET}
      B2C_UPSTREAM: http://b2c-storefront:3200
      B2B_UPSTREAM: http://b2b-storefront:3300

  # ── B2C Storefront (Next.js) ──────────────────────────
  b2c-storefront:
    build:
      context: .
      dockerfile: docker/b2c-storefront.Dockerfile
    restart: unless-stopped
    profiles: ["b2c", "full"]
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://backend:3001

  # ── Caddy (Reverse Proxy + On-Demand TLS) ──────────────
  caddy:
    build:
      context: .
      dockerfile: docker/caddy.Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - portal
      - storefront-router
    environment:
      PORTAL_HOSTNAME: ${PORTAL_HOSTNAME}
      TLS_ASK_SECRET: ${TLS_ASK_SECRET}
      BACKEND_HOST: backend:3001
      ADMIN_HOST: portal:3000
      ROUTER_HOST: storefront-router:3100
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  # ── Seed Runner (one-shot, only runs on demand) ────────
  seed:
    build:
      context: .
      dockerfile: docker/seed.Dockerfile
    profiles: ["seed"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-helix}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_SURNAME: ${ADMIN_SURNAME:-User}
      PORTAL_HOSTNAME: ${PORTAL_HOSTNAME}
      TLS_ASK_SECRET: ${TLS_ASK_SECRET}

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddy_data:
  caddy_config:
